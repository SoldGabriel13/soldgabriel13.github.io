<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexicon</title>
    <link rel="icon" type="image/png" href="/icons/favicon.png" />

    <style>
        /* ─── fonts & variables ─────────────────────────────────────────── */
        @font-face {
            font-family: 'FlumenianFont';
            src: url('/conlangs/proto-flumenian/genesis1/FlumenianScriptVf.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        :root {
            --main-green: #2e7d32;
            --light-green: #a5d6a7;
            --bg: #f4fdf6;
            --text: #1b1b1b;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--main-green);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }

        main {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 1rem;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        #search {
            width: 100%;
            padding: 0.9rem;
            border: 2px solid var(--light-green);
            border-radius: 10px;
            font-size: 1rem;
        }

        #mode {
            padding: 0.6rem;
            border-radius: 8px;
            border: 2px solid var(--light-green);
            width: fit-content;
        }

        .stats {
            opacity: 0.7;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: white;
            border: 2px solid var(--light-green);
            border-radius: 10px;
            padding: 1rem;
            position: relative;
            transition: border-color 0.2s;
        }

        .card:hover {
            border-color: var(--main-green);
        }

        .Lemma {
            font-size: 1.4rem;
            font-family: 'FlumenianFont', serif;
            font-weight: bold;
            color: var(--main-green);
        }

        .ipa {
            font-style: italic;
            opacity: 0.8;
        }

        .pos {
            display: inline-block;
            background: var(--light-green);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
        }

        .tag {
            background: #e8f5e9;
            padding: 0.2rem 0.5rem;
            border-radius: 999px;
            font-size: 0.8rem;
        }

        /* ─── conjugation dropdown ────────────────────────────────────── */
        .conjugation-section {
            margin-top: 0.8rem;
            border-top: 1px solid var(--light-green);
            padding-top: 0.8rem;
        }

        .conjugation-toggle {
            background: none;
            border: none;
            color: var(--main-green);
            font-weight: bold;
            cursor: pointer;
            padding: 0.3rem 0;
            width: 100%;
            text-align: left;
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conjugation-toggle:hover {
            color: #1b5e20;
        }

        .conjugation-toggle .arrow {
            transition: transform 0.2s;
            display: inline-block;
        }

        .conjugation-toggle .arrow.open {
            transform: rotate(90deg);
        }

        .conjugation-list {
            display: none;
            margin-top: 0.5rem;
            background: #f8fdf9;
            border-radius: 8px;
            padding: 0.5rem;
            max-height: 300px;
            overflow-y: auto;
        }

        .conjugation-list.open {
            display: block;
        }

        .conjugation-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0.5rem;
            border-bottom: 1px solid #e8f5e9;
            font-size: 0.9rem;
        }

        .conjugation-item:last-child {
            border-bottom: none;
        }

        .conjugation-item .form {
            font-family: 'FlumenianFont', serif;
            color: var(--main-green);
        }

        .conjugation-item .form-ipa {
            font-style: italic;
            opacity: 0.7;
            font-size: 0.85rem;
        }

        .conjugation-item .play-btn-small {
            background: none;
            border: 1px solid var(--main-green);
            border-radius: 999px;
            padding: 0.15rem 0.6rem;
            font-size: 0.7rem;
            cursor: pointer;
            color: var(--main-green);
            transition: background 0.2s, color 0.2s;
        }

        .conjugation-item .play-btn-small:hover {
            background: var(--main-green);
            color: white;
        }

        .conjugation-item .play-btn-small:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .conjugation-item .play-btn-small.playing {
            background: var(--main-green);
            color: white;
        }

        /* ─── play button ────────────────────────────────────────────────── */
        .play-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-top: 0.7rem;
            padding: 0.35rem 0.85rem 0.35rem 0.6rem;
            border: 2px solid var(--main-green);
            border-radius: 999px;
            background: transparent;
            color: var(--main-green);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.1s;
        }

        .play-btn:hover {
            background: var(--main-green);
            color: white;
        }

        .play-btn:active {
            transform: scale(0.94);
        }

        .play-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .play-btn.playing {
            background: var(--main-green);
            color: white;
            animation: pulse 0.8s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(46, 125, 50, 0.4);
            }
            100% {
                box-shadow: 0 0 0 6px rgba(46, 125, 50, 0);
            }
        }

        /* ─── toast ──────────────────────────────────────────────────────── */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
        }

        .conjugation-group-label {
            font-weight: bold;
            color: #2e7d32;
            margin: 0.4rem 0 0.2rem 0;
            font-size: 0.85rem;
            border-bottom: 1px dashed #a5d6a7;
            padding-bottom: 0.2rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>Lexicon</h1>
    </header>

    <main>
        <div class="controls">
            <input id="search" placeholder="Search…" />
            <select id="mode">
                <option value="Lemma">Lemma</option>
                <option value="Gloss">Gloss</option>
            </select>
            <div class="stats" id="stats">Loading…</div>
        </div>
        <div class="grid" id="grid"></div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        // ════════════════════════════════════════════════════════════════
        //  CONFIGURATION
        // ════════════════════════════════════════════════════════════════
        // List of lemmas that should NOT have certain inflections generated
        // Format: { lemma: { noTa: true, noCi: true, noPlural: true } }
        const INFLECTION_EXCEPTIONS = {
            // Verbs that already have 'ta-' prefix - these should NOT get indirect forms
            'tahutspe': { noTa: true, noCi: false, noPlural: true },
            'tahutscipe': { noTa: true, noCi: false, noPlural: true },
            // Verbs that already have '-ci-' infix - these should NOT get intensive forms
            'hutscipe': { noTa: false, noCi: true, noPlural: true },
            // Add more as needed based on your lexicon
        };

        // Verb conjugation patterns
        const TENSE_SUFFIXES = {
            'present': 'pe',
            'past': 'be',
            'future': 'te',
            'habitual': 'bupe',
            'recent_past': 'bube',
            'near_future': 'bute',
            'continuous_present': 'pu',
            'imperative': 'tu'
        };

        const INDIRECT_PREFIX = 'ta';
        const INTENSITY_INFIX = 'ci';

        // ─── Helper functions ─────────────────────────────────────────────
        function getStem(lemma) {
            // Remove the present tense suffix '-pe' to get the stem
            // The stem is the part before "-pe"
            if (lemma.endsWith('pe')) {
                return lemma.slice(0, -2);
            }
            // For verbs that might already have ta- or ci-, still remove -pe
            for (const suffix of Object.values(TENSE_SUFFIXES)) {
                if (lemma.endsWith(suffix)) {
                    return lemma.slice(0, -suffix.length);
                }
            }
            return lemma;
        }

        function generateConjugations(lemma, ipa) {
            // Get the stem by removing '-pe' (the present tense suffix)
            const stem = getStem(lemma);
            const exceptions = INFLECTION_EXCEPTIONS[lemma] || {};
            const conjugations = [];

            // Check if this is a verb (ends with -pe or is in exceptions)
            const isVerb = lemma.endsWith('pe') || 
                           Object.keys(INFLECTION_EXCEPTIONS).includes(lemma);

            if (!isVerb) return [];

            // For each tense
            for (const [tense, suffix] of Object.entries(TENSE_SUFFIXES)) {
                // Base form: stem + tense suffix
                const baseForm = stem + suffix;
                const ipaBase = generateIPA(stem, suffix, ipa, false, false);

                // Regular form (direct)
                conjugations.push({
                    form: baseForm,
                    ipa: ipaBase,
                    label: tense.replace('_', ' '),
                    type: 'direct',
                    group: 'direct'
                });

                // Indirect (ta- prefix) - only if not excluded
                if (!exceptions.noTa) {
                    const indirectForm = INDIRECT_PREFIX + baseForm;
                    const ipaIndirect = generateIPA(stem, suffix, ipa, true, false);
                    conjugations.push({
                        form: indirectForm,
                        ipa: ipaIndirect,
                        label: tense.replace('_', ' '),
                        type: 'indirect',
                        group: 'indirect'
                    });
                }

                // Intensive (-ci- infix before suffix) - only if not excluded
                if (!exceptions.noCi) {
                    const intensiveForm = stem + INTENSITY_INFIX + suffix;
                    const ipaIntensive = generateIPA(stem, suffix, ipa, false, true);
                    conjugations.push({
                        form: intensiveForm,
                        ipa: ipaIntensive,
                        label: tense.replace('_', ' '),
                        type: 'intensive',
                        group: 'intensive'
                    });
                }

                // Indirect + Intensive - only if neither is excluded
                if (!exceptions.noTa && !exceptions.noCi) {
                    const indirectIntensiveForm = INDIRECT_PREFIX + stem + INTENSITY_INFIX + suffix;
                    const ipaIndirectIntensive = generateIPA(stem, suffix, ipa, true, true);
                    conjugations.push({
                        form: indirectIntensiveForm,
                        ipa: ipaIndirectIntensive,
                        label: tense.replace('_', ' '),
                        type: 'indirect_intensive',
                        group: 'indirect_intensive'
                    });
                }
            }

            return conjugations;
        }

        function generateIPA(stem, suffix, originalIpa, indirect, intensive) {
            if (!originalIpa) return '';

            // Get the IPA for the stem by removing '-pe' from the end
            let stemIpa = originalIpa;
            if (originalIpa.endsWith('pe')) {
                stemIpa = originalIpa.slice(0, -2);
            } else {
                // Try other suffixes
                for (const val of Object.values(TENSE_SUFFIXES)) {
                    if (originalIpa.endsWith(val)) {
                        stemIpa = originalIpa.slice(0, -val.length);
                        break;
                    }
                }
            }

            let result = stemIpa;

            // Add intensity infix (ci) before suffix
            if (intensive) {
                // Insert 'ʃi' before the suffix in the IPA
                // This is an approximation - you may need to adjust based on actual phonetics
                result = result + 'ʃi';
            }

            // Add indirect prefix
            if (indirect) {
                result = 'ta' + result;
            }

            // Add the suffix back
            const suffixMapReverse = {
                'pe': 'pe',
                'be': 'be',
                'te': 'te',
                'bupe': 'bupe',
                'bube': 'bube',
                'bute': 'bute',
                'pu': 'pu',
                'tu': 'tu'
            };
            
            for (const [key, val] of Object.entries(suffixMapReverse)) {
                if (suffix === key) {
                    result = result + val;
                    break;
                }
            }

            return result;
        }

        // ─── PHONEME SUBSTITUTIONS ──────────────────────────────────────
        const PHONEME_MAP = {
            'ɸ': 'F',
            'β': 'BH',
            'ʈʂ': '( T SS )',
            'tʃ': 'T SH',
            'dʒ': 'D ZH',
            'ts': 'T S',
            'dz': 'D Z',
            'ʃ': 'SH',
            'ʒ': 'ZH',
            'θ': 'TH',
            'ð': 'DH',
            'x': 'VELH',
            'ɣ': 'VELR',
            'ŋ': 'NG',
            'ʂ': 'SS',
            'æ': 'AE',
            'ɑ': 'ah',
            'ɛ': 'EH',
            'ɪ': 'IH',
            'ʊ': 'OO',
            'ɔ': 'OH',
            'ə': 'UH',
            'ɚ': 'ER',
            'ɾ': 'r-50 D r',
            'ɹ': 'R',
            'ʁ': 'UVR',
            'ɫ': 'DL',
            'l': 'L',
            '.': '',
            '\'': ' ',
            'ˈ': '',
            'ˌ': '',
            'ˑ': '',
            'r': '( DX DX DX DX )',
        };

        function substitutePhonemes(ipa) {
            if (!ipa) return '';

            const tokens = [];
            let i = 0;
            const len = ipa.length;

            const multiKeys = Object.keys(PHONEME_MAP)
                .filter(k => k.length > 1)
                .sort((a, b) => b.length - a.length);

            const lengthMarkers = [':', 'ː'];

            while (i < len) {
                let matched = false;
                for (const key of multiKeys) {
                    if (ipa.startsWith(key, i)) {
                        tokens.push(key);
                        i += key.length;
                        matched = true;
                        break;
                    }
                }
                if (matched) continue;
                tokens.push(ipa[i]);
                i++;
            }

            const processed = [];
            for (let idx = 0; idx < tokens.length; idx++) {
                const token = tokens[idx];
                if (lengthMarkers.includes(token)) {
                    if (processed.length > 0) {
                        const last = processed.pop();
                        processed.push('r+50');
                        processed.push(last);
                        processed.push('r');
                    }
                    continue;
                }
                let mapped = PHONEME_MAP[token];
                if (mapped === undefined) {
                    if (token.length === 1) {
                        mapped = token.toUpperCase();
                    } else {
                        mapped = token;
                    }
                }
                if (mapped !== '') {
                    processed.push(mapped);
                }
            }
            return processed.join(' ');
        }

        // ─── SPEAK FUNCTION ──────────────────────────────────────────────
        let _speakFn = null;
        let _speakPromise = null;

        function getSpeak() {
            if (_speakFn) return Promise.resolve(_speakFn);
            if (_speakPromise) return _speakPromise;

            _speakPromise = (async () => {
                if (typeof window.speak === 'function') {
                    _speakFn = window.speak;
                    return _speakFn;
                }
                try {
                    const mod = await import('./src/main.js?v=0.5.0');
                    const fn = mod.speak || mod.default || null;
                    if (typeof fn === 'function') {
                        _speakFn = fn;
                        window.speak = fn;
                        return _speakFn;
                    }
                    throw new Error('speak not found');
                } catch (err) {
                    console.warn('Could not load speak():', err);
                    _speakFn = (text) => {
                        console.log(`[speak fallback] ${text}`);
                        showToast(`🔊 ${text}`);
                    };
                    return _speakFn;
                }
            })();
            return _speakPromise;
        }

        // ─── TOAST ────────────────────────────────────────────────────────
        let toastTimer = null;

        function showToast(msg, duration = 2000) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => el.classList.remove('show'), duration);
        }

        // ─── PLAY AUDIO ──────────────────────────────────────────────────
        async function playAudio(ipa, buttonEl) {
            if (!ipa) {
                showToast('No IPA to speak', 1200);
                return;
            }
            if (buttonEl && buttonEl.classList.contains('playing')) return;

            const processed = substitutePhonemes(ipa);
            if (!processed) {
                showToast('No phonemes to speak', 1200);
                return;
            }

            try {
                if (buttonEl) {
                    buttonEl.classList.add('playing');
                    buttonEl.disabled = true;
                    const label = buttonEl.querySelector('.label') || buttonEl;
                    if (label) label.textContent = '…';
                }

                const speak = await getSpeak();
                const result = speak(processed);
                if (result && typeof result.then === 'function') {
                    await result;
                }
            } catch (err) {
                console.error('Playback error:', err);
                showToast(`⚠️ ${err.message || 'Playback failed'}`, 2500);
            } finally {
                if (buttonEl) {
                    buttonEl.classList.remove('playing');
                    buttonEl.disabled = false;
                    const label = buttonEl.querySelector('.label') || buttonEl;
                    if (label) label.textContent = '▶';
                }
            }
        }

        window.playAudio = playAudio;

        // ─── RENDER ──────────────────────────────────────────────────────
        let entries = [];

        function matchField(value, query) {
            return (value || '').toLowerCase().includes(query);
        }

        function render(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map((e) => {
                const ipa = e.IPA || '';
                const hasIpa = Boolean(ipa.trim());
                const pos = e.pos || '';
                
                // Check if this is a verb: ends with -pe or is in exceptions
                const isVerb = (e.Lemma || '').endsWith('pe') || 
                               Object.keys(INFLECTION_EXCEPTIONS).includes(e.Lemma || '');
                
                const isNoun = pos === 'noun' || pos === 'N' || pos === 'n';
                const isPronoun = pos === 'pronoun' || pos === 'Pron' || pos === 'PRO';

                // Generate noun plural
                let pluralForm = null;
                let pluralIpa = null;
                if (isNoun && e.Lemma && !INFLECTION_EXCEPTIONS[e.Lemma]?.noPlural) {
                    pluralForm = e.Lemma + 'm';
                    pluralIpa = ipa ? ipa + 'm' : '';
                }

                // Generate pronoun inflection (singular form)
                let pronounSingular = null;
                let pronounSingularIpa = null;
                if (isPronoun && e.Lemma && e.Lemma.endsWith('m')) {
                    pronounSingular = e.Lemma.slice(0, -1);
                    pronounSingularIpa = ipa ? ipa.slice(0, -1) : '';
                }

                // Generate verb conjugations
                let conjugations = [];
                if (isVerb) {
                    conjugations = generateConjugations(e.Lemma, ipa);
                }

                // Group conjugations by type
                const grouped = {};
                const groupLabels = {
                    'direct': 'Direct',
                    'indirect': 'Indirect (ta-)',
                    'intensive': 'Intensive (-ci-)',
                    'indirect_intensive': 'Indirect + Intensive'
                };

                conjugations.forEach(c => {
                    if (!grouped[c.group]) grouped[c.group] = [];
                    grouped[c.group].push(c);
                });

                // Get the stem for display
                const stem = isVerb ? getStem(e.Lemma) : '';

                return `
                    <div class="card">
                        <div class="Lemma">${e.Lemma || ''}</div>
                        ${ipa ? `<div class="ipa">/${ipa}/</div>` : ''}
                        ${stem ? `<div style="font-size:0.8rem;opacity:0.6;">Stem: ${stem}</div>` : ''}
                        <div>${e.Gloss || ''}</div>
                        <div class="pos">${e.pos || ''}</div>
                        ${e.Tags ? `<div class="tags">${e.Tags.split(';').filter(t => t.trim()).map(t => `<span class="tag">${t.trim()}</span>`).join('')}</div>` : ''}
                        
                        ${pluralForm ? `
                            <div style="margin-top:0.5rem;font-size:0.9rem;background:#f0f8f0;padding:0.3rem 0.6rem;border-radius:6px;display:flex;justify-content:space-between;align-items:center;">
                                <span>Plural: <strong>${pluralForm}</strong> ${pluralIpa ? `/${pluralIpa}/` : ''}</span>
                                <button class="play-btn-small" data-ipa="${pluralIpa || ''}" ${!pluralIpa ? 'disabled' : ''} onclick="window.playAudio(this.dataset.ipa, this)">▶</button>
                            </div>
                        ` : ''}
                        
                        ${pronounSingular ? `
                            <div style="margin-top:0.5rem;font-size:0.9rem;background:#f0f8f0;padding:0.3rem 0.6rem;border-radius:6px;display:flex;justify-content:space-between;align-items:center;">
                                <span>Singular: <strong>${pronounSingular}</strong> ${pronounSingularIpa ? `/${pronounSingularIpa}/` : ''}</span>
                                <button class="play-btn-small" data-ipa="${pronounSingularIpa || ''}" ${!pronounSingularIpa ? 'disabled' : ''} onclick="window.playAudio(this.dataset.ipa, this)">▶</button>
                            </div>
                        ` : ''}

                        ${conjugations.length > 0 ? `
                            <div class="conjugation-section">
                                <button class="conjugation-toggle" onclick="toggleConjugations(this)">
                                    <span>Conjugations (${conjugations.length})</span>
                                    <span class="arrow">▶</span>
                                </button>
                                <div class="conjugation-list">
                                    ${Object.entries(grouped).map(([group, items]) => `
                                        <div class="conjugation-group-label">${groupLabels[group] || group}</div>
                                        ${items.map(c => `
                                            <div class="conjugation-item">
                                                <span>
                                                    <span class="form">${c.form}</span>
                                                    ${c.ipa ? `<span class="form-ipa">/${c.ipa}/</span>` : ''}
                                                    <span style="font-size:0.7rem;opacity:0.6;margin-left:0.5rem;">${c.label}</span>
                                                </span>
                                                <button class="play-btn-small" data-ipa="${c.ipa || ''}" ${!c.ipa ? 'disabled' : ''} onclick="window.playAudio(this.dataset.ipa, this)">▶</button>
                                            </div>
                                        `).join('')}
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}

                        <button class="play-btn" data-ipa="${ipa.replace(/"/g, '&quot;')}" ${!hasIpa ? 'disabled' : ''} onclick="window.playAudio(this.dataset.ipa, this)">
                            <span class="icon">▶</span>
                            <span class="label">${hasIpa ? 'Play' : 'No IPA'}</span>
                        </button>
                    </div>
                `;
            }).join('');
        }

        function toggleConjugations(btn) {
            const list = btn.parentElement.querySelector('.conjugation-list');
            const arrow = btn.querySelector('.arrow');
            if (list) {
                list.classList.toggle('open');
                if (arrow) arrow.classList.toggle('open');
            }
        }
        window.toggleConjugations = toggleConjugations;

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            const mode = document.getElementById('mode').value;
            const filtered = entries.filter((e) => {
                if (mode === 'Lemma') return matchField(e.Lemma, q);
                if (mode === 'Gloss') return matchField(e.Gloss, q);
                return true;
            });
            render(filtered);
        }

        async function load() {
            try {
                const res = await fetch('/conlangs/proto-flumenian/lexicon.json');
                entries = await res.json();
                document.getElementById('stats').textContent =
                    `${entries.length} entries loaded`;
                render(entries);
            } catch (err) {
                console.error('Failed to load lexicon:', err);
                document.getElementById('stats').textContent = '⚠️ Failed to load';
            }
        }

        document.getElementById('search').addEventListener('input', filter);
        document.getElementById('mode').addEventListener('change', filter);
        load();

        // Pre-load speak()
        getSpeak().catch(() => {});
        // speak("H E L OOO TH EH ER , AAIH E M UH P ER S UH N")
    </script>

    <script type="module" src="src/main.js?v=0.5.0"></script>
</body>
